<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GlowSkin AI - Skincare Dashboard</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: #0b0f1a;
    color: white;
    display: flex;
}

/* SIDEBAR */
.sidebar {
    width: 220px;
    height: 100vh;
    background: rgba(255,255,255,0.03);
    backdrop-filter: blur(10px);
    padding: 20px;
    position: fixed;
}

.sidebar h2 {
    color: #ff6f91;
    margin-bottom: 30px;
}

.sidebar a {
    display: block;
    color: #cbd5e1;
    text-decoration: none;
    margin: 15px 0;
    transition: 0.2s;
}

.sidebar a:hover {
    color: #ff6f91;
}

/* MAIN */
.main {
    margin-left: 240px;
    padding: 20px;
    width: 100%;
}

/* TOP BAR */
.topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
}

.search {
    padding: 10px;
    border-radius: 10px;
    border: none;
    width: 250px;
}

/* FILTERS */
.filters {
    margin: 15px 0;
    display: flex;
    gap: 10px;
}

select {
    padding: 10px;
    border-radius: 10px;
    border: none;
}

/* CARDS */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 15px;
    margin-top: 20px;
}

.card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 15px;
    border-radius: 15px;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
    border-color: #ff6f91;
}

.tag {
    font-size: 12px;
    background: rgba(255,111,145,0.2);
    padding: 3px 8px;
    border-radius: 20px;
    margin-right: 5px;
    display: inline-block;
    margin-top: 5px;
}

/* ROUTINE PANEL */
.panel {
    margin-top: 30px;
    padding: 15px;
    background: rgba(255,255,255,0.03);
    border-radius: 15px;
}

.step {
    display: inline-block;
    margin: 5px;
    padding: 8px 12px;
    background: rgba(255,255,255,0.05);
    border-radius: 10px;
    cursor: pointer;
}

.step.done {
    background: #2ecc71;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>GlowSkin AI</h2>
<a href="#">Dashboard</a>
<a href="#">Products</a>
<a href="#">Routine</a>
<a href="#">Favorites</a>
<a href="#">Settings</a>
</div>

<!-- MAIN -->
<div class="main">

<div class="topbar">
<h1>Skincare Dashboard</h1>
<input class="search" id="search" placeholder="Search products..." oninput="filter()">
</div>

<!-- FILTERS -->
<div class="filters">
<select id="skin" onchange="filter()">
<option value="all">Skin Type</option>
<option value="oily">Oily</option>
<option value="dry">Dry</option>
<option value="sensitive">Sensitive</option>
<option value="all">All</option>
</select>
</div>

<!-- PRODUCTS -->
<div class="grid" id="grid"></div>

<!-- ROUTINE -->
<div class="panel">
<h2>Your Routine</h2>
<p class="sub">Click to complete steps</p>

<div>
<span class="step" onclick="toggle(this)">Cleanser</span>
<span class="step" onclick="toggle(this)">Serum</span>
<span class="step" onclick="toggle(this)">Moisturizer</span>
<span class="step" onclick="toggle(this)">Sunscreen</span>
</div>

</div>

</div>

<script>

const data = [
{name:"Gentle Cleanser", type:"oily", tag:["Oil Control"]},
{name:"Hydrating Moisturizer", type:"dry", tag:["Hydration"]},
{name:"Vitamin C Serum", type:"all", tag:["Glow"]},
{name:"SPF 50 Sunscreen", type:"all", tag:["Protection"]},
{name:"Calming Gel", type:"sensitive", tag:["Redness Relief"]}
];

function render(list){
    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    list.forEach(p => {
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <h3>${p.name}</h3>
            <p>Recommended skincare product</p>
            ${p.tag.map(t => `<span class="tag">${t}</span>`).join("")}
        `;

        grid.appendChild(div);
    });
}

function filter(){
    let skin = document.getElementById("skin").value;
    let search = document.getElementById("search").value.toLowerCase();

    let filtered = data.filter(p =>
        (skin === "all" || p.type === skin) &&
        p.name.toLowerCase().includes(search)
    );

    render(filtered);
}

function toggle(el){
    el.classList.toggle("done");
}

render(data);

</script>

</body>
</html>
